<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyPath — Python Learning Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b10;
  --bg2: #0d1117;
  --bg3: #111720;
  --bg4: #161d2a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8edf5;
  --text2: #8a95a8;
  --text3: #4a5568;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --green: #00e676;
  --amber: #ffb300;
  --red: #ff5252;
  --pink: #f06292;
  --teal: #26c6da;
  --p1: #00d4ff;
  --p2: #7c3aed;
  --p3: #00e676;
  --p4: #ffb300;
  --p5: #f06292;
  --p6: #26c6da;
  --p7: #ff5252;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Glow orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
  opacity: 0.15;
}
.orb1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; }
.orb2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -150px; }

.app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

/* HEADER */
.header { margin-bottom: 3rem; animation: fadeDown 0.6s ease both; }
.header-top { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
.logo-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 0 20px rgba(0,212,255,0.4);
}
.logo-text { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
.logo-text span { color: var(--accent); }
.tagline { font-size: 12px; color: var(--text2); margin-top: 2px; letter-spacing: 0.5px; }
.version-badge {
  margin-left: auto; font-size: 10px; padding: 3px 10px;
  border: 1px solid var(--border2); border-radius: 999px;
  color: var(--text2); letter-spacing: 1px;
}

/* STATS BAR */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; animation: fadeUp 0.6s 0.1s ease both; }
.stat-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  position: relative; overflow: hidden; transition: border-color 0.3s;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0; transition: opacity 0.3s;
}
.stat-card:hover { border-color: var(--border2); }
.stat-card:hover::before { opacity: 1; }
.stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--text2); margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
.stat-num.cyan { color: var(--accent); }
.stat-num.purple { color: var(--accent2); }
.stat-num.green { color: var(--green); }
.stat-num.amber { color: var(--amber); }

/* PROGRESS */
.progress-section { margin-bottom: 1.5rem; animation: fadeUp 0.6s 0.15s ease both; }
.progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-title { font-size: 11px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
.progress-pct { font-size: 11px; color: var(--accent); font-weight: 500; }
.progress-track {
  height: 6px; background: var(--bg3); border-radius: 999px; overflow: hidden;
  border: 1px solid var(--border);
}
.progress-fill {
  height: 100%; border-radius: 999px; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.progress-fill::after {
  content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 10px; height: 10px; border-radius: 50%;
  background: white; box-shadow: 0 0 8px var(--accent);
  opacity: 0; transition: opacity 0.3s;
}
.progress-fill.active::after { opacity: 1; }

/* PHASE TABS */
.tabs-wrap { margin-bottom: 1.5rem; animation: fadeUp 0.6s 0.2s ease both; }
.tabs-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  font-size: 11px; cursor: pointer; color: var(--text2);
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.tab::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  opacity: 0; transition: opacity 0.2s;
}
.tab span { position: relative; z-index: 1; }
.tab:hover { border-color: var(--border2); color: var(--text); }
.tab.active { border-color: transparent; color: var(--bg); font-weight: 500; }
.tab.active::before { opacity: 1; }

/* PHASE BLOCKS */
.phases-container { display: flex; flex-direction: column; gap: 12px; }

.phase-block {
  border: 1px solid var(--border); border-radius: 16px;
  overflow: hidden; transition: border-color 0.3s;
  animation: fadeUp 0.5s ease both;
}
.phase-block:hover { border-color: var(--border2); }

.phase-header {
  padding: 16px 20px; cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  background: var(--bg3); transition: background 0.2s;
  user-select: none;
}
.phase-header:hover { background: var(--bg4); }

.phase-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 10px currentColor;
}
.phase-icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.1);
}
.phase-meta { flex: 1; min-width: 0; }
.phase-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
.phase-sub { font-size: 10px; color: var(--text2); margin-top: 2px; letter-spacing: 0.3px; }
.phase-right { display: flex; align-items: center; gap: 10px; }
.phase-progress-mini {
  width: 60px; height: 4px; background: var(--bg); border-radius: 999px; overflow: hidden;
}
.phase-progress-mini-fill { height: 100%; border-radius: 999px; transition: width 0.4s; }
.phase-count { font-size: 11px; color: var(--text2); min-width: 32px; text-align: right; }
.phase-chevron {
  font-size: 11px; color: var(--text3);
  transition: transform 0.3s; flex-shrink: 0;
}
.phase-chevron.open { transform: rotate(90deg); }

.phase-body { display: none; background: var(--bg2); }
.phase-body.open { display: block; }

/* SECTION */
.section-divider {
  padding: 10px 20px 6px;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3);
  display: flex; align-items: center; gap: 8px;
}
.section-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.section-icon { font-size: 12px; }

/* ITEMS */
.item {
  margin: 0 16px 8px;
  border: 1px solid var(--border); border-radius: 12px;
  background: var(--bg3); overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}
.item:hover { border-color: var(--border2); }
.item.completed { border-color: rgba(0,230,118,0.2); }

.item-header {
  padding: 12px 14px; display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer;
}
.item-check {
  width: 20px; height: 20px; border-radius: 6px;
  border: 1.5px solid var(--border2); background: transparent;
  cursor: pointer; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s; position: relative;
}
.item-check::after {
  content: '✓'; color: var(--bg); font-size: 11px; font-weight: 600;
  opacity: 0; transform: scale(0.5); transition: all 0.2s;
}
.item-check.done { background: var(--green); border-color: var(--green); box-shadow: 0 0 12px rgba(0,230,118,0.4); }
.item-check.done::after { opacity: 1; transform: scale(1); }

.item-main { flex: 1; min-width: 0; }
.item-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.item-title { font-size: 13px; font-weight: 500; line-height: 1.3; }
.item-title.done { text-decoration: line-through; color: var(--text3); }
.type-pill {
  font-size: 9px; padding: 2px 7px; border-radius: 999px; letter-spacing: 0.5px;
  text-transform: uppercase; flex-shrink: 0; font-weight: 500;
}
.pill-problem { background: rgba(0,212,255,0.12); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
.pill-project { background: rgba(0,230,118,0.12); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
.item-desc { font-size: 11px; color: var(--text2); margin-top: 5px; line-height: 1.6; }

.item-expand-btn {
  font-size: 10px; color: var(--text3); flex-shrink: 0; margin-top: 2px;
  transition: color 0.2s, transform 0.3s; padding: 2px;
}
.item-expand-btn.open { transform: rotate(180deg); color: var(--accent); }

/* HINT SECTION */
.item-detail {
  display: none; padding: 0 14px 14px;
  border-top: 1px solid var(--border);
  margin: 0 0 0;
  animation: expandIn 0.25s ease;
}
.item-detail.open { display: block; }

@keyframes expandIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

.hint-block {
  margin-top: 12px; padding: 12px 14px;
  background: var(--bg); border-radius: 10px;
  border: 1px solid rgba(0,212,255,0.1);
}
.hint-title {
  font-size: 10px; color: var(--accent); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.hint-title::before { content: '💡'; font-size: 12px; }

.hint-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.chip {
  font-size: 11px; padding: 3px 10px; border-radius: 6px;
  background: rgba(124,58,237,0.15); color: #a78bfa;
  border: 1px solid rgba(124,58,237,0.25); font-family: 'JetBrains Mono', monospace;
}
.chip.lib { background: rgba(0,212,255,0.1); color: var(--accent); border-color: rgba(0,212,255,0.2); }
.chip.concept { background: rgba(255,179,0,0.1); color: var(--amber); border-color: rgba(255,179,0,0.2); }

.hint-tip { font-size: 11px; color: var(--text2); line-height: 1.6; }
.hint-tip strong { color: var(--text); }

.motivate-block {
  margin-top: 10px; padding: 10px 14px;
  background: linear-gradient(135deg, rgba(0,230,118,0.06), rgba(0,212,255,0.06));
  border-radius: 10px; border: 1px solid rgba(0,230,118,0.15);
  font-size: 11px; color: var(--green); line-height: 1.6;
}
.motivate-block::before { content: '🚀  '; }

/* NOTES */
.notes-wrap { margin-top: 10px; }
.notes-label { font-size: 10px; color: var(--text3); letter-spacing: 0.5px; margin-bottom: 5px; text-transform: uppercase; }
.notes-area {
  width: 100%; padding: 8px 10px; font-size: 11px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text);
  font-family: 'JetBrains Mono', monospace; resize: vertical; min-height: 56px;
  transition: border-color 0.2s; line-height: 1.6;
}
.notes-area:focus { outline: none; border-color: rgba(0,212,255,0.4); }
.notes-area::placeholder { color: var(--text3); }

/* BOTTOM BAR */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(8,11,16,0.9); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); padding: 12px 2rem;
  display: flex; align-items: center; gap: 12px; z-index: 100;
}
.btn {
  padding: 8px 20px; border-radius: 8px;
  border: 1px solid var(--border2); background: transparent;
  font-size: 12px; cursor: pointer; color: var(--text);
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.btn:hover { background: var(--bg3); }
.btn-primary {
  border-color: var(--accent); color: var(--accent);
  box-shadow: 0 0 15px rgba(0,212,255,0.15);
}
.btn-primary:hover { background: rgba(0,212,255,0.1); box-shadow: 0 0 25px rgba(0,212,255,0.25); }
.btn-danger { border-color: rgba(255,82,82,0.4); color: var(--red); }
.btn-danger:hover { background: rgba(255,82,82,0.08); }
.saved-toast {
  font-size: 11px; color: var(--green);
  opacity: 0; transform: translateY(4px);
  transition: all 0.3s; display: flex; align-items: center; gap: 5px;
}
.saved-toast.show { opacity: 1; transform: translateY(0); }
.bottom-right { margin-left: auto; font-size: 11px; color: var(--text3); }

/* COMPLETION BURST */
@keyframes burst {
  0% { transform: scale(0.8); opacity: 0; }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
.item-check.done { animation: burst 0.3s ease; }

/* ANIMATIONS */
@keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.phase-block:nth-child(1) { animation-delay: 0.05s; }
.phase-block:nth-child(2) { animation-delay: 0.1s; }
.phase-block:nth-child(3) { animation-delay: 0.15s; }
.phase-block:nth-child(4) { animation-delay: 0.2s; }
.phase-block:nth-child(5) { animation-delay: 0.25s; }
.phase-block:nth-child(6) { animation-delay: 0.3s; }
.phase-block:nth-child(7) { animation-delay: 0.35s; }

/* CONFETTI */
.confetti-piece {
  position: fixed; width: 8px; height: 8px; border-radius: 2px;
  pointer-events: none; z-index: 9999;
  animation: confettiFall 1.2s ease forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border2); }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo-icon">🐍</div>
      <div>
        <div class="logo-text">Py<span>Path</span></div>
        <div class="tagline">From zero to Automation + Cybersecurity — one step at a time</div>
      </div>
      <div class="version-badge">v2.0</div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num cyan" id="s-done">0</div><div class="stat-lbl">Completed</div></div>
    <div class="stat-card"><div class="stat-num purple" id="s-prob">0</div><div class="stat-lbl">Problems</div></div>
    <div class="stat-card"><div class="stat-num green" id="s-proj">0</div><div class="stat-lbl">Projects</div></div>
    <div class="stat-card"><div class="stat-num amber" id="s-pct">0%</div><div class="stat-lbl">Progress</div></div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title">Overall Progress</span>
      <span class="progress-pct" id="progress-label">0 / 0 tasks</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs-label">Filter by Phase</div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="phases-container" id="phases"></div>
</div>

<div class="bottom-bar">
  <button class="btn btn-primary" onclick="saveAll()">💾 Save Progress</button>
  <button class="btn btn-danger" onclick="resetAll()">Reset</button>
  <div class="saved-toast" id="saved-toast">✓ Progress saved!</div>
  <div class="bottom-right" id="streak-text"></div>
</div>

<script>
const PHASES = [
  {
    id:'p1', color:'#00d4ff', icon:'🧱', name:'Phase 1', sub:'Python Foundations',
    items:[
      {id:'p1_1',type:'problem',title:'Variables & Data Types',desc:'Explore int, float, str, and bool. Store a name, age, and score in variables and print them.',
       libs:['Built-in only'],concepts:['Variables','Type casting','print()','type()'],
       hint:'In Python you don\'t need to declare a variable\'s type — just assign a value. Use `type()` to check it.',
       motivate:'This is the foundation for everything! Once you\'re comfortable here, everything ahead will feel easier.'},
      {id:'p1_2',type:'problem',title:'Input/Output & String Magic',desc:'Take input from the user and greet them. Use f-strings, slicing, and methods like .upper() and .split().',
       libs:['Built-in','string module'],concepts:['input()','f-strings','String methods','Slicing'],
       hint:'f-strings are the fastest way: `f"Hello {name}!"`. `.strip()` removes whitespace.',
       motivate:'Strings are everywhere — logs, reports, and user data all start as strings!'},
      {id:'p1_3',type:'problem',title:'Conditions & Decision Making',desc:'Determine a category from age. Check if a number is positive, negative, or zero. Build a grade calculator.',
       libs:['Built-in only'],concepts:['if/elif/else','Comparison ops','Logical ops','Ternary'],
       hint:'Use `and`, `or`, `not` for complex conditions. Ternary expression: `x if condition else y`',
       motivate:'Every cybersecurity tool makes decisions — malicious or safe? This is exactly that logic!'},
      {id:'p1_4',type:'problem',title:'Loops — For & While',desc:'Print numbers 1-100. Write FizzBuzz. Print the elements of a list. Create an infinite loop and break out of it.',
       libs:['Built-in','range()'],concepts:['for loop','while loop','break','continue','range()'],
       hint:'`range(1,101)` gives you 1 to 100. `enumerate()` also gives you the index.',
       motivate:'Loops are the heart of automation! Would you really process 1000 files manually without them?'},
      {id:'p1_5',type:'problem',title:'Lists & Tuples',desc:'Build a to-do list. Sort it. Find the max/min. Explore nested lists.',
       libs:['Built-in','list methods'],concepts:['append()','remove()','sort()','slicing','len()'],
       hint:'Lists are mutable, tuples are immutable. `.sort()` works in-place, `sorted()` returns a new list.',
       motivate:'IP addresses, usernames, logs — tools store all of these in lists!'},
      {id:'p1_6',type:'problem',title:'Dictionaries & Sets',desc:'Build a student-marks dictionary. Make a word-frequency counter. Remove duplicates using a set.',
       libs:['Built-in','collections'],concepts:['dict methods','get()','items()','set operations'],
       hint:'Use `.get(key, default)` to avoid a KeyError. Set intersection/union are very useful.',
       motivate:'JSON data, config files, user databases — they\'re all dictionaries under the hood!'},
      {id:'p1_7',type:'problem',title:'Functions — Reusable Code',desc:'Write a calculator function. Use default parameters. Explore *args and **kwargs.',
       libs:['Built-in only'],concepts:['def','return','*args','**kwargs','default params'],
       hint:'A function should do one job — single responsibility. `*args` gives you a tuple, `**kwargs` gives you a dict.',
       motivate:'Write once, use many times — that\'s the core principle of automation!'},
      {id:'p1_8',type:'problem',title:'File Read & Write',desc:'Create a text file, read it, and append to it. Count the lines. Search for a word inside the file.',
       libs:['Built-in open()','pathlib','os'],concepts:['open()','read/write modes','with statement','readlines()'],
       hint:'Always use `with open() as f:` — it closes the file automatically. Remember the `r`, `w`, `a`, `rb` modes.',
       motivate:'Reading log files is a basic cybersecurity skill — it all starts here!'},
      {id:'p1_pj1',type:'project',title:'📋 Project: Contact Book CLI',desc:'Build a terminal app to add, search, delete, and list contacts. Save them permanently to a file.',
       libs:['json','os','Built-in'],concepts:['CRUD ops','JSON save/load','Functions','Loops'],
       hint:'Store contacts in a JSON file — it\'s human-readable and easy to parse. Write a separate function for each operation.',
       motivate:'Your first real app! This is usually what people show as "my first project" in interviews — be proud of it!'},
      {id:'p1_pj2',type:'project',title:'🎮 Project: Number Guessing Game',desc:'The computer picks a number and the user guesses it with hints. Add difficulty levels. Save the high score.',
       libs:['random','json','Built-in'],concepts:['random.randint()','Game loop','Score tracking','File save'],
       hint:'Use `random.randint(1, 100)`. Count the attempts. Score = max_attempts - attempts_taken.',
       motivate:'Building games might sound boring, but this logic — loops, conditions, state — is used the same way in real tools!'},
    ]
  },
  {
    id:'p2', color:'#7c3aed', icon:'⚡', name:'Phase 2', sub:'Intermediate Python',
    items:[
      {id:'p2_1',type:'problem',title:'List Comprehensions & Generators',desc:'Write even numbers, squares, and filtered lists as one-liners. Also try generator expressions.',
       libs:['Built-in only'],concepts:['List comprehension','Generator','filter()','map()'],
       hint:'`[x*2 for x in range(10) if x%2==0]` — you can add a condition at the end too.',

let state = {}, notes = {}, activeTab = 'all';

function loadState() {
  try {
    const s = localStorage.getItem('pypath_state');
    const n = localStorage.getItem('pypath_notes');
    if (s) state = JSON.parse(s);
    if (n) notes = JSON.parse(n);
  } catch(e) {}
}

function saveAll() {
  localStorage.setItem('pypath_state', JSON.stringify(state));
  localStorage.setItem('pypath_notes', JSON.stringify(notes));
  const t = document.getElementById('saved-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone!')) return;
  state = {}; notes = {};
  localStorage.removeItem('pypath_state');
  localStorage.removeItem('pypath_notes');
  render();
}

function confetti(x, y) {
  const colors = ['#00d4ff','#7c3aed','#00e676','#ffb300','#f06292'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${x + (Math.random()-0.5)*60}px;top:${y}px;background:${colors[Math.floor(Math.random()*colors.length)]};transform:rotate(${Math.random()*360}deg);animation-delay:${Math.random()*0.3}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

function toggleItem(id, event) {
  event.stopPropagation();
  state[id] = !state[id];
  if (state[id]) {
    const rect = event.target.getBoundingClientRect();
    confetti(rect.left + rect.width/2, rect.top);
  }
  saveAll();
  updateAll();
}

function toggleDetail(id) {
  const detail = document.getElementById('detail-' + id);
  const btn = document.getElementById('expand-' + id);
  if (detail) {
    detail.classList.toggle('open');
    btn && btn.classList.toggle('open');
  }
}

function updateAll() {
  const allItems = PHASES.flatMap(p => p.items);
  const total = allItems.length;
  const done = allItems.filter(i => state[i.id]).length;
  const problems = allItems.filter(i => i.type==='problem' && state[i.id]).length;
  const projects = allItems.filter(i => i.type==='project' && state[i.id]).length;
  const pct = total ? Math.round(done/total*100) : 0;

  document.getElementById('s-done').textContent = done;
  document.getElementById('s-prob').textContent = problems;
  document.getElementById('s-proj').textContent = projects;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('progress-label').textContent = done + ' / ' + total + ' tasks';
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('active', pct > 0 && pct < 100);
  document.getElementById('streak-text').textContent = done > 0 ? '🔥 Keep going! ' + (total - done) + ' remaining' : 'Start your journey!';

  PHASES.forEach(ph => {
    const pDone = ph.items.filter(i => state[i.id]).length;
    const phPct = Math.round(pDone / ph.items.length * 100);
    const mini = document.getElementById('mini-' + ph.id);
    if (mini) mini.style.width = phPct + '%';
    const cnt = document.getElementById('cnt-' + ph.id);
    if (cnt) cnt.textContent = pDone + '/' + ph.items.length;

    ph.items.forEach(item => {
      const chk = document.getElementById('chk-' + item.id);
      const ttl = document.getElementById('ttl-' + item.id);
      const blk = document.getElementById('blk-' + item.id);
      if (chk) chk.classList.toggle('done', !!state[item.id]);
      if (ttl) ttl.classList.toggle('done', !!state[item.id]);
      if (blk) blk.classList.toggle('completed', !!state[item.id]);
    });
  });
}

function renderItem(item) {
  const typePill = item.type === 'problem'
    ? '<span class="type-pill pill-problem">problem</span>'
    : '<span class="type-pill pill-project">project</span>';
  const chipsLibs = item.libs.map(l => `<span class="chip lib">${l}</span>`).join('');
  const chipsConcepts = item.concepts.map(c => `<span class="chip concept">${c}</span>`).join('');
  return `<div class="item ${state[item.id]?'completed':''}" id="blk-${item.id}">
    <div class="item-header">
      <div class="item-check ${state[item.id]?'done':''}" id="chk-${item.id}" onclick="toggleItem('${item.id}',event)"></div>
      <div class="item-main">
        <div class="item-top">
          <span class="item-title ${state[item.id]?'done':''}" id="ttl-${item.id}">${item.title}</span>
          ${typePill}
        </div>
        <div class="item-desc">${item.desc}</div>
      </div>
      <div class="item-expand-btn" id="expand-${item.id}" onclick="toggleDetail('${item.id}')">▼</div>
    </div>
    <div class="item-detail" id="detail-${item.id}">
      <div class="hint-block">
        <div class="hint-title">Libraries & Tools</div>
        <div class="hint-chips">${chipsLibs}</div>
        <div class="hint-title" style="margin-top:8px">Key Concepts</div>
        <div class="hint-chips">${chipsConcepts}</div>
        <div class="hint-tip" style="margin-top:10px">💡 <strong>Hint:</strong> ${item.hint}</div>
      </div>
      <div class="motivate-block">${item.motivate}</div>
      <div class="notes-wrap">
        <div class="notes-label">My Notes & Code</div>
        <textarea class="notes-area" placeholder="Write your notes, code snippets, errors, and solutions here..." oninput="notes['${item.id}']=this.value;saveAll()">${(notes[item.id]||'').replace(/</g,'&lt;')}</textarea>
      </div>
    </div>
  </div>`;
}

function renderPhase(ph, open) {
  const pDone = ph.items.filter(i => state[i.id]).length;
  const phPct = Math.round(pDone/ph.items.length*100);
  const problems = ph.items.filter(i => i.type==='problem');
  const projects = ph.items.filter(i => i.type==='project');
  return `<div class="phase-block">
    <div class="phase-header" onclick="togglePhase('pbody-${ph.id}','parr-${ph.id}')">
      <div class="phase-dot" style="color:${ph.color};background:${ph.color}"></div>
      <div class="phase-icon" style="background:${ph.color}18;border-color:${ph.color}30">${ph.icon}</div>
      <div class="phase-meta">
        <div class="phase-name" style="color:${ph.color}">${ph.name}: ${ph.sub}</div>
        <div class="phase-sub">${ph.items.length} tasks · ${pDone} completed</div>
      </div>
      <div class="phase-right">
        <div class="phase-progress-mini"><div class="phase-progress-mini-fill" id="mini-${ph.id}" style="width:${phPct}%;background:${ph.color}"></div></div>
        <div class="phase-count" id="cnt-${ph.id}">${pDone}/${ph.items.length}</div>
        <div class="phase-chevron ${open?'open':''}" id="parr-${ph.id}">▶</div>
      </div>
    </div>
    <div class="phase-body ${open?'open':''}" id="pbody-${ph.id}">
      <div class="section-divider"><span class="section-icon">📝</span>Problems</div>
      ${problems.map(renderItem).join('')}
      <div class="section-divider"><span class="section-icon">🏗️</span>Projects</div>
      ${projects.map(renderItem).join('')}
      <div style="height:12px"></div>
    </div>
  </div>`;
}

function togglePhase(bodyId, arrId) {
  document.getElementById(bodyId).classList.toggle('open');
  document.getElementById(arrId).classList.toggle('open');
}

function setTab(t) {
  activeTab = t;
  render();
}

function render() {
  const tabsEl = document.getElementById('tabs');
  const allTabs = ['all', ...PHASES.map(p => p.id)];
  tabsEl.innerHTML = allTabs.map(t => {
    const ph = PHASES.find(p => p.id === t);
    const label = t === 'all' ? 'All Phases' : ph.phase;
    const style = t !== 'all' && activeTab === t ? `background:${ph.color};color:#000;border-color:${ph.color}` : '';
    return `<button class="tab ${activeTab===t?'active':''}" style="${style}" onclick="setTab('${t}')"><span>${label}</span></button>`;
  }).join('');

  const phases = activeTab === 'all' ? PHASES : PHASES.filter(p => p.id === activeTab);
  document.getElementById('phases').innerHTML = phases.map((ph, i) => renderPhase(ph, i===0 || activeTab!=='all')).join('');
  updateAll();
}

loadState();
render();
</script>
